name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        shell: cmd
        env:
          NLS_BUILD_TARGETS: NullusUnitTests ReflectionTest
        run: build_windows.bat ${{ matrix.configuration }} ${{ matrix.platform }}

      - name: Run unit tests
        shell: cmd
        run: |
          build\windows\bin\${{ matrix.configuration }}\NullusUnitTests.exe
          build\windows\bin\${{ matrix.configuration }}\ReflectionTest.exe
