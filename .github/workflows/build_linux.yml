name: Build Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install system build dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config clang \
            libwayland-dev wayland-protocols \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libxfixes-dev libxkbcommon-dev \
            libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev

      - name: Build
        run: NLS_CMAKE_OPTIONS="-DNLS_BUILD_TESTS=ON" NLS_BUILD_TARGETS="NullusUnitTests ReflectionTest" NLS_BUILD_JOBS=1 ./build_linux.sh debug

      - name: Run unit tests
        timeout-minutes: 20
        run: |
          set -euo pipefail
          ls -R build/linux/bin || true
          NULLUS_UNIT_TESTS="$(find build/linux -type f -name NullusUnitTests | head -n 1)"
          REFLECTION_TEST="$(find build/linux -type f -name ReflectionTest | head -n 1)"
          echo "NullusUnitTests: ${NULLUS_UNIT_TESTS}"
          echo "ReflectionTest: ${REFLECTION_TEST}"
          test -n "${NULLUS_UNIT_TESTS}"
          test -n "${REFLECTION_TEST}"
          file "${NULLUS_UNIT_TESTS}" || true
          file "${REFLECTION_TEST}" || true
          run_test() {
            local label="$1"
            local log_path="$2"
            shift 2
            echo "Running ${label}"
            set +e
            "$@" 2>&1 | tee "${log_path}"
            local test_exit=${PIPESTATUS[0]}
            set -e
            if [[ ${test_exit} -ne 0 ]]; then
              echo "::error::${label} failed with exit code ${test_exit}"
              while IFS= read -r line; do
                echo "::error::$line"
              done < <(tail -n 200 "${log_path}")
              exit "${test_exit}"
            fi
          }
          run_test "NullusUnitTests" nullus_unit_tests.log "${NULLUS_UNIT_TESTS}"
          run_test "ReflectionTest" reflection_test.log "${REFLECTION_TEST}"
