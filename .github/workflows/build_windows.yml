name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 15
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        timeout-minutes: 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Vulkan SDK
        timeout-minutes: 30
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $choco = Get-Command choco -ErrorAction SilentlyContinue
          if (-not $choco) {
            throw "Chocolatey is required on windows-2022 to install Vulkan SDK, but choco was not found."
          }

          $vulkanSdkPackageVersion = '1.4.341'
          $vulkanSdkInstallVersion = "$vulkanSdkPackageVersion.0"
          & $choco.Source install vulkan-sdk --version=$vulkanSdkPackageVersion -y --no-progress
          if ($LASTEXITCODE -ne 0) {
            throw "Chocolatey failed to install Vulkan SDK with exit code $LASTEXITCODE."
          }

          function Test-VulkanSdkRoot {
            param([string]$Path)

            if ([string]::IsNullOrWhiteSpace($Path) -or -not (Test-Path -LiteralPath $Path -PathType Container)) {
              return $false
            }

            $hasHeaders = Test-Path -LiteralPath (Join-Path $Path 'Include\vulkan\vulkan.h') -PathType Leaf
            $hasLoaderLib = Test-Path -LiteralPath (Join-Path $Path 'Lib\vulkan-1.lib') -PathType Leaf
            $hasBin = Test-Path -LiteralPath (Join-Path $Path 'Bin') -PathType Container
            return $hasHeaders -and $hasLoaderLib -and $hasBin
          }

          $candidates = @()
          $candidates += "C:\VulkanSDK\$vulkanSdkInstallVersion"
          if ($env:VULKAN_SDK) {
            $candidates += $env:VULKAN_SDK
          }
          if ($env:VK_SDK_PATH) {
            $candidates += $env:VK_SDK_PATH
          }
          if (Test-Path -LiteralPath 'C:\VulkanSDK\latest' -PathType Container) {
            $candidates += 'C:\VulkanSDK\latest'
          }
          if (Test-Path -LiteralPath 'C:\VulkanSDK' -PathType Container) {
            $candidates += @(Get-ChildItem -LiteralPath 'C:\VulkanSDK' -Directory |
              Sort-Object Name -Descending |
              ForEach-Object { $_.FullName })
          }
          if (Test-Path -LiteralPath 'C:\Program Files\VulkanSDK' -PathType Container) {
            $candidates += @(Get-ChildItem -LiteralPath 'C:\Program Files\VulkanSDK' -Directory |
              Sort-Object Name -Descending |
              ForEach-Object { $_.FullName })
          }

          $candidates = @($candidates | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique)
          $vulkanSdk = $candidates |
            Where-Object { Test-VulkanSdkRoot $_ } |
            Select-Object -First 1

          if (-not $vulkanSdk) {
            $candidateText = if ($candidates.Count -gt 0) { $candidates -join ', ' } else { '<none>' }
            throw "Vulkan SDK installation did not produce a usable SDK root. Checked: $candidateText"
          }

          Write-Host "Using Vulkan SDK: $vulkanSdk"
          "VULKAN_SDK=$vulkanSdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VK_SDK_PATH=$vulkanSdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $vulkanBin = Join-Path $vulkanSdk 'Bin'
          if (Test-Path -LiteralPath $vulkanBin -PathType Container) {
            $vulkanBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Configure
        timeout-minutes: 20
        shell: powershell
        run: cmake -S . -B build\windows -G "Visual Studio 17 2022" -A ${{ matrix.platform }} -DCMAKE_CONFIGURATION_TYPES=${{ matrix.configuration }} -DNLS_BUILD_TESTS=ON

      - name: Restore MetaParser
        timeout-minutes: 10
        shell: powershell
        run: dotnet restore build\windows\Tools\MetaParser\generated\src\MetaParser.csproj

      - name: Build
        id: build_step
        timeout-minutes: 60
        shell: powershell
        continue-on-error: true
        run: |
          $buildArgs = @(
            "--build", "build/windows",
            "--config", "${{ matrix.configuration }}",
            "--target", "NullusUnitTests", "ReflectionTest",
            "--",
            "/m:1",
            "/flp:logfile=build_windows_${{ matrix.configuration }}_msbuild.log;verbosity=diagnostic",
            "/bl:build_windows_${{ matrix.configuration }}.binlog"
          )
          & cmake @buildArgs *>&1 | Tee-Object -FilePath "build_windows_${{ matrix.configuration }}.log"
          $buildExit = $LASTEXITCODE
          "exit_code=$buildExit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($buildExit -ne 0) {
            exit $buildExit
          }

      - name: Dump build log on failure
        if: always() && steps.build_step.outputs.exit_code != '0'
        shell: powershell
        run: |
          $logPath = "build_windows_${{ matrix.configuration }}.log"
          $msbuildLogPath = "build_windows_${{ matrix.configuration }}_msbuild.log"
          if (Test-Path $logPath) {
            Write-Output "::group::Last 200 lines of Windows build log"
            Get-Content $logPath -Tail 200
            Write-Output "::endgroup::"
            Get-Content $logPath -Tail 50 | ForEach-Object { Write-Output "::error::$_" }
          }
          if (Test-Path $msbuildLogPath) {
            Write-Output "::group::Last 200 lines of Windows MSBuild log"
            Get-Content $msbuildLogPath -Tail 200
            Write-Output "::endgroup::"
            Get-Content $msbuildLogPath -Tail 50 | ForEach-Object { Write-Output "::error::$_" }
          }

      - name: Upload Windows build logs
        if: always() && steps.build_step.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            build_windows_${{ matrix.configuration }}.log
            build_windows_${{ matrix.configuration }}_msbuild.log
            build_windows_${{ matrix.configuration }}.binlog

      - name: Fail on build error
        if: always() && steps.build_step.outputs.exit_code != '0'
        shell: powershell
        run: |
          $exitCodeText = '${{ steps.build_step.outputs.exit_code }}'
          if ([string]::IsNullOrWhiteSpace($exitCodeText)) {
            Write-Output "::error::Windows build timed out or ended before reporting an exit code."
            exit 1
          }
          exit [int]$exitCodeText

      - name: Run unit tests
        timeout-minutes: 45
        shell: powershell
        run: |
          Get-ChildItem "build/windows/bin/${{ matrix.configuration }}" | Format-Table -AutoSize
          $unitLog = "nullus_unit_tests.log"
          $reflectionLog = "reflection_test.log"
          $unitExe = (Resolve-Path "build/windows/bin/${{ matrix.configuration }}/NullusUnitTests.exe").Path
          $reflectionExe = (Resolve-Path "build/windows/bin/${{ matrix.configuration }}/ReflectionTest.exe").Path
          $unitCommand = '"' + $unitExe + '" 2>&1'
          cmd /d /c $unitCommand | Tee-Object -FilePath $unitLog
          $unitExit = $LASTEXITCODE
          if ($unitExit -ne 0) {
            Write-Output "::error::NullusUnitTests failed with exit code $unitExit"
            Get-Content $unitLog -Tail 200 | ForEach-Object { Write-Output "::error::$_" }
            exit $unitExit
          }
          $reflectionCommand = '"' + $reflectionExe + '" 2>&1'
          cmd /d /c $reflectionCommand | Tee-Object -FilePath $reflectionLog
          $reflectionExit = $LASTEXITCODE
          if ($reflectionExit -ne 0) {
            Write-Output "::error::ReflectionTest failed with exit code $reflectionExit"
            Get-Content $reflectionLog -Tail 200 | ForEach-Object { Write-Output "::error::$_" }
            exit $reflectionExit
          }
