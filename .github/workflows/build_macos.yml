name: Build MacOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        configuration: [debug, release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          NLS_BUILD_TARGETS="NullusUnitTests ReflectionTest" ./build_macos.sh ${{ matrix.configuration }} 2>&1 | tee "build_macos_${{ matrix.configuration }}.log"

      - name: Dump build log on failure
        if: failure()
        shell: bash
        run: |
          if [[ -f "build_macos_${{ matrix.configuration }}.log" ]]; then
            echo "::group::Last 200 lines of macOS build log"
            tail -n 200 "build_macos_${{ matrix.configuration }}.log"
            echo "::endgroup::"
            while IFS= read -r line; do
              echo "::error::$line"
            done < <(tail -n 20 "build_macos_${{ matrix.configuration }}.log")
          fi

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          NULLUS_UNIT_TESTS="$(find build/macos -type f -name NullusUnitTests | head -n 1)"
          REFLECTION_TEST="$(find build/macos -type f -name ReflectionTest | head -n 1)"
          echo "NullusUnitTests: ${NULLUS_UNIT_TESTS}"
          echo "ReflectionTest: ${REFLECTION_TEST}"
          test -n "${NULLUS_UNIT_TESTS}"
          test -n "${REFLECTION_TEST}"
          "${NULLUS_UNIT_TESTS}"
          "${REFLECTION_TEST}"
