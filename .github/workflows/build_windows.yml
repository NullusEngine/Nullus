name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Configure
        shell: cmd
        run: cmake -S . -B build\windows -G "Visual Studio 17 2022" -A ${{ matrix.platform }} -DCMAKE_CONFIGURATION_TYPES=${{ matrix.configuration }}

      - name: Restore MetaParser
        shell: cmd
        run: dotnet restore build\windows\Tools\MetaParser\src\MetaParser.csproj

      - name: Build
        shell: cmd
        run: cmake --build build\windows --config ${{ matrix.configuration }} --target NullusUnitTests ReflectionTest -- /m:1

      - name: Run unit tests
        shell: cmd
        run: |
          dir build\windows\bin\${{ matrix.configuration }}
          build\windows\bin\${{ matrix.configuration }}\NullusUnitTests.exe > nullus_unit_tests.log 2>&1
          set UNIT_EXIT=%ERRORLEVEL%
          type nullus_unit_tests.log
          if not "%UNIT_EXIT%"=="0" exit /b %UNIT_EXIT%
          build\windows\bin\${{ matrix.configuration }}\ReflectionTest.exe > reflection_test.log 2>&1
          set REFLECTION_EXIT=%ERRORLEVEL%
          type reflection_test.log
          if not "%REFLECTION_EXIT%"=="0" exit /b %REFLECTION_EXIT%
