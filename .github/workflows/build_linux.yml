name: Build Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [debug, release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install system build dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config clang \
            libwayland-dev wayland-protocols \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libxfixes-dev libxkbcommon-dev \
            libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev

      - name: Build
        run: NLS_BUILD_TARGETS="NullusUnitTests ReflectionTest" ./build_linux.sh ${{ matrix.configuration }}

      - name: Run unit tests
        run: |
          set -euo pipefail
          ls -R build/linux/bin || true
          NULLUS_UNIT_TESTS="$(find build/linux -type f -name NullusUnitTests | head -n 1)"
          REFLECTION_TEST="$(find build/linux -type f -name ReflectionTest | head -n 1)"
          echo "NullusUnitTests: ${NULLUS_UNIT_TESTS}"
          echo "ReflectionTest: ${REFLECTION_TEST}"
          test -n "${NULLUS_UNIT_TESTS}"
          test -n "${REFLECTION_TEST}"
          file "${NULLUS_UNIT_TESTS}" || true
          file "${REFLECTION_TEST}" || true
          "${NULLUS_UNIT_TESTS}" > nullus_unit_tests.log 2>&1 || {
            cat nullus_unit_tests.log
            exit 1
          }
          cat nullus_unit_tests.log
          "${REFLECTION_TEST}" > reflection_test.log 2>&1 || {
            cat reflection_test.log
            exit 1
          }
          cat reflection_test.log
