name: Build MacOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          NLS_BUILD_TARGETS="NullusUnitTests ReflectionTest" NLS_BUILD_JOBS=1 ./build_macos.sh debug 2>&1 | tee "build_macos_debug.log"

      - name: Dump build log on failure
        if: failure()
        shell: bash
        run: |
          if [[ -f "build_macos_debug.log" ]]; then
            echo "::group::Last 200 lines of macOS build log"
            tail -n 200 "build_macos_debug.log"
            echo "::endgroup::"
            while IFS= read -r line; do
              echo "::error::$line"
            done < <(tail -n 20 "build_macos_debug.log")
          fi

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          ls -R build/macos/bin || true
          NULLUS_UNIT_TESTS="$(find build/macos -type f -name NullusUnitTests | head -n 1)"
          REFLECTION_TEST="$(find build/macos -type f -name ReflectionTest | head -n 1)"
          echo "NullusUnitTests: ${NULLUS_UNIT_TESTS}"
          echo "ReflectionTest: ${REFLECTION_TEST}"
          test -n "${NULLUS_UNIT_TESTS}"
          test -n "${REFLECTION_TEST}"
          file "${NULLUS_UNIT_TESTS}" || true
          file "${REFLECTION_TEST}" || true
          "${NULLUS_UNIT_TESTS}" > nullus_unit_tests.log 2>&1 || {
            cat nullus_unit_tests.log
            while IFS= read -r line; do
              echo "::error::$line"
            done < nullus_unit_tests.log
            exit 1
          }
          cat nullus_unit_tests.log
          "${REFLECTION_TEST}" > reflection_test.log 2>&1 || {
            cat reflection_test.log
            while IFS= read -r line; do
              echo "::error::$line"
            done < reflection_test.log
            exit 1
          }
          cat reflection_test.log
