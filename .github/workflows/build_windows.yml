name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Vulkan SDK
        shell: powershell
        run: |
          winget install --id KhronosGroup.VulkanSDK --exact --accept-package-agreements --accept-source-agreements --disable-interactivity

          $vulkanSdk = $null
          if (Test-Path 'C:\VulkanSDK') {
            $vulkanSdk = Get-ChildItem 'C:\VulkanSDK' -Directory |
              Sort-Object Name -Descending |
              Select-Object -First 1
          }

          if (-not $vulkanSdk) {
            throw "Vulkan SDK installation did not produce a discoverable C:\\VulkanSDK directory."
          }

          "VULKAN_SDK=$($vulkanSdk.FullName)" >> $env:GITHUB_ENV
          "VK_SDK_PATH=$($vulkanSdk.FullName)" >> $env:GITHUB_ENV

      - name: Configure
        shell: powershell
        run: cmake -S . -B build\windows -G "Visual Studio 17 2022" -A ${{ matrix.platform }} -DCMAKE_CONFIGURATION_TYPES=${{ matrix.configuration }}

      - name: Restore MetaParser
        shell: powershell
        run: dotnet restore build\windows\Tools\MetaParser\src\MetaParser.csproj

      - name: Build
        id: build_step
        shell: powershell
        continue-on-error: true
        run: |
          $buildArgs = @(
            "--build", "build/windows",
            "--config", "${{ matrix.configuration }}",
            "--target", "NullusUnitTests", "ReflectionTest",
            "--",
            "/m:1",
            "/flp:logfile=build_windows_${{ matrix.configuration }}_msbuild.log;verbosity=diagnostic",
            "/bl:build_windows_${{ matrix.configuration }}.binlog"
          )
          & cmake @buildArgs *>&1 | Tee-Object -FilePath "build_windows_${{ matrix.configuration }}.log"
          $buildExit = $LASTEXITCODE
          "exit_code=$buildExit" >> $env:GITHUB_OUTPUT
          if ($buildExit -ne 0) {
            exit $buildExit
          }

      - name: Dump build log on failure
        if: always() && steps.build_step.outputs.exit_code != '0'
        shell: powershell
        run: |
          $logPath = "build_windows_${{ matrix.configuration }}.log"
          $msbuildLogPath = "build_windows_${{ matrix.configuration }}_msbuild.log"
          if (Test-Path $logPath) {
            Write-Output "::group::Last 200 lines of Windows build log"
            Get-Content $logPath -Tail 200
            Write-Output "::endgroup::"
            Get-Content $logPath -Tail 50 | ForEach-Object { Write-Output "::error::$_" }
          }
          if (Test-Path $msbuildLogPath) {
            Write-Output "::group::Last 200 lines of Windows MSBuild log"
            Get-Content $msbuildLogPath -Tail 200
            Write-Output "::endgroup::"
            Get-Content $msbuildLogPath -Tail 50 | ForEach-Object { Write-Output "::error::$_" }
          }

      - name: Upload Windows build logs
        if: always() && steps.build_step.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            build_windows_${{ matrix.configuration }}.log
            build_windows_${{ matrix.configuration }}_msbuild.log
            build_windows_${{ matrix.configuration }}.binlog

      - name: Fail on build error
        if: always() && steps.build_step.outputs.exit_code != '0'
        shell: powershell
        run: exit [int]'${{ steps.build_step.outputs.exit_code }}'

      - name: Run unit tests
        shell: powershell
        run: |
          Get-ChildItem "build/windows/bin/${{ matrix.configuration }}" | Format-Table -AutoSize
          $unitLog = "nullus_unit_tests.log"
          $reflectionLog = "reflection_test.log"
          & "build/windows/bin/${{ matrix.configuration }}/NullusUnitTests.exe" *>&1 | Tee-Object -FilePath $unitLog
          if ($LASTEXITCODE -ne 0) {
            Get-Content $unitLog | ForEach-Object { Write-Output "::error::$_" }
            exit $LASTEXITCODE
          }
          & "build/windows/bin/${{ matrix.configuration }}/ReflectionTest.exe" *>&1 | Tee-Object -FilePath $reflectionLog
          if ($LASTEXITCODE -ne 0) {
            Get-Content $reflectionLog | ForEach-Object { Write-Output "::error::$_" }
            exit $LASTEXITCODE
          }
